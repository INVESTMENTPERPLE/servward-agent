# Cloudflare Worker + Static Assets — sitio de Servward (servward.espymelab.com).
# Sirve docs/ como estático; worker.js añade Range (206) para los vídeos en /media/.
name = "servward"
compatibility_date = "2025-06-01"
main = "worker.js"

[assets]
directory = "./docs"
binding = "ASSETS"
not_found_handling = "404-page"
